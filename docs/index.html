/* ── SPARKLINE ── */
function Spark({data,color='#ff6a1a',w=92,h=22}){
  const mx=Math.max(...data),mn=Math.min(...data),sp=mx-mn||1;
  const dx=w/(data.length-1);
  const pts=data.map((v,i)=>[i*dx,h-((v-mn)/sp)*(h-4)-2]);
  const line=pts.map((p,i)=>`${i?'L':'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area=`${line} L${w},${h} L0,${h} Z`;
  const id='g'+Math.random().toString(36).slice(2,6);
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:'block'}}>
      <defs><linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity=".35"/><stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      <path d={area} fill={`url(#${id})`}/>
      <path d={line} stroke={color} strokeWidth="1.5" fill="none" strokeLinecap="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="2" fill={color}/>
    </svg>
  );
}

/* ── AREA CHART ── */
function AreaChart({series,W=680,H=230,labels,yFmt}){
  const PAD={l:48,r:14,t:14,b:28};
  const all=series.flatMap(s=>s.data);
  const max=Math.max(...all)*1.08;
  const n=series[0].data.length;
  const x=i=>PAD.l+(i/(n-1))*(W-PAD.l-PAD.r);
  const y=v=>PAD.t+(1-v/max)*(H-PAD.t-PAD.b);
  const path=arr=>arr.map((v,i)=>`${i?'L':'M'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const area=arr=>`${path(arr)} L${x(n-1)},${H-PAD.b} L${PAD.l},${H-PAD.b} Z`;
  const step=Math.ceil(n/6);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{display:'block'}}>
      <defs>{series.map((s,i)=>(
        <linearGradient key={i} id={`ac${i}${W}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={s.color} stopOpacity=".28"/>
          <stop offset="100%" stopColor={s.color} stopOpacity="0"/>
        </linearGradient>
      ))}</defs>
      {[0,.25,.5,.75,1].map((p,i)=>{
        const v=max*p;
        return <g key={i}>
          <line x1={PAD.l} x2={W-PAD.r} y1={y(v)} y2={y(v)} stroke="#1f1f23" strokeDasharray="2 4"/>
          <text x={PAD.l-8} y={y(v)+3} textAnchor="end" fill="#5a5a60" fontSize="10" fontFamily="JetBrains Mono">{yFmt?yFmt(v):(v/1000).toFixed(0)+'k'}</text>
        </g>;
      })}
      {Array.from({length:n},(_,i)=>i).filter(i=>i%step===0||i===n-1).map(i=>(
        <text key={i} x={x(i)} y={H-8} textAnchor="middle" fill="#5a5a60" fontSize="10" fontFamily="JetBrains Mono">{labels?labels[i]:String(i+1).padStart(2,'0')}</text>
      ))}
      {series.map((s,i)=>(
        <g key={i}>
          <path d={area(s.data)} fill={`url(#ac${i}${W})`}/>
          <path d={path(s.data)} fill="none" stroke={s.color} strokeWidth="2" strokeLinecap="round"/>
        </g>
      ))}
    </svg>
  );
}

/* ── DONUT ── */
function Donut({data,size=160,label,sub}){
  const total=data.reduce((s,d)=>s+d.v,0);
  const R=size*.34,cx=size/2,cy=size/2,sw=size*.13,circ=2*Math.PI*R;
  let cum=0;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{display:'block'}}>
      <circle cx={cx} cy={cy} r={R} fill="none" stroke="rgba(255,255,255,.04)" strokeWidth={sw}/>
      {data.map((d,i)=>{
        const dash=(d.v/total)*circ,off=circ-(cum/total)*circ;
        cum+=d.v;
        return <circle key={i} cx={cx} cy={cy} r={R} fill="none" stroke={d.c} strokeWidth={sw}
          strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={off}
          style={{transform:'rotate(-90deg)',transformOrigin:`${cx}px ${cy}px`}}/>;
      })}
      {label&&<text x={cx} y={cy-5} textAnchor="middle" fill="var(--text)" fontSize={size*.13} fontWeight="800" fontFamily="JetBrains Mono">{label}</text>}
      {sub&&<text x={cx} y={cy+14} textAnchor="middle" fill="#8d8d93" fontSize={size*.075}>{sub}</text>}
    </svg>
  );
}

        </div>
        <div className="grid-3">
          {M.map((m,i)=>{
            const d=(m.c-m.p)/m.p*100;
            const up=d>=0;
            return (
              <div className="panel" key={i}>
                <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--mute)',fontWeight:600,marginBottom:8}}>{m.l}</div>
                <div className="row" style={{alignItems:'flex-end',gap:12,marginBottom:8}}>
                  <span className="mono" style={{fontSize:26,fontWeight:800}}>{m.f(m.c)}</span>
                  <span className={`delta ${up?'up':'down'}`}>{up?I.up:I.dn}{up?'+':''}{Math.abs(d).toFixed(1)}%</span>
                </div>
                <div style={{fontSize:12,color:'var(--faint)'}}>Пред.: <span style={{color:'var(--mute)'}}>{m.f(m.p)}</span></div>
                <div style={{marginTop:10,height:6,background:'rgba(255,255,255,.05)',borderRadius:999,overflow:'hidden'}}><div style={{width:`${Math.min(m.c/Math.max(m.c,m.p)*100,100)}%`,height:'100%',background:up?'var(--green)':'var(--red)',borderRadius:999}}/></div>
                <div style={{marginTop:3}}><div style={{width:`${Math.min(m.p/Math.max(m.c,m.p)*100,100)}%`,height:4,background:'rgba(255,255,255,.07)',borderRadius:999}}/></div>
              </div>
            );
          })}
        </div>
      </div>
    </main></div>
  );
}

/* ═══ 8. ТОП/ФЛОП ═══ */
function TopFlopScreen({onNav}){
  const sorted=[...PRODUCTS].sort((a,b)=>b.profit-a.profit);
  const top=sorted.slice(0,5);
  const flop=[...sorted].reverse().slice(0,5);
  const Row=({p,i,isFlop})=>(
    <div className="brkrow">
      <span style={{width:28,height:28,borderRadius:9,background:isFlop?'var(--red-bg)':'var(--green-bg)',color:isFlop?'var(--red)':'var(--green)',display:'grid',placeItems:'center',flexShrink:0,fontFamily:'var(--mono)',fontSize:11,fontWeight:800}}>{isFlop?'↓':'↑'}{i+1}</span>
      <div className="pthumb" style={{width:32,height:32}}>{p.e}</div>
      <div style={{flex:1}}><div style={{fontWeight:600,fontSize:12.5}}>{p.name}</div><div className="psub">{p.sku} · {p.cat}</div></div>
      <span className={`pchip ${p.p}`} style={{flexShrink:0}}><span className="sw">{p.p==='wb'?'W':'O'}</span>{p.p==='wb'?'WB':'Ozon'}</span>
      <span className="brkval" style={{color:p.profit>=0?'var(--green)':'var(--red)',width:70}}>{fK(p.profit)}</span>
      <span className="brkval mono" style={{color:p.roi>=30?'var(--green)':p.roi>=10?'var(--yellow)':'var(--red)',width:52}}>{p.roi}%</span>
    </div>
  );
  return (
    <div className="app"><Sidebar active="top" onNav={onNav}/>
    <main className="main">
      <Topbar title="Топ / Флоп" crumb={<><b>По прибыли</b> · 30 дней</>}/>
      <div className="content">
        <div className="kpi-row-4">
          <Kpi accent="green"  label="Лидер прибыли"  value={fK(top[0].profit)} sub={top[0].name} ico={I.star}/>
          <Kpi accent="orange" label="ROI лидер"      value={top[0].roi+'%'}    sub="Коврик для йоги" ico={I.pct}/>
          <Kpi accent="red"    label="Убыточных SKU"  value={String(PRODUCTS.filter(p=>p.profit<0).length)} sub="товаров в минусе" ico={I.alert}/>
          <Kpi accent="violet" label="Лучшая кат."    value="Дом и кухня"       sub="29% выручки" ico={I.cats}/>
        </div>
        <div className="grid-2">
          <div className="panel"><div className="panel-head"><div><div className="panel-title">🏆 Топ 5 — лучшие</div><div className="panel-sub">По прибыли · 30 дней</div></div></div>{top.map((p,i)=><Row key={p.sku} p={p} i={i} isFlop={false}/>)}</div>
          <div className="panel"><div className="panel-head"><div><div className="panel-title">📉 Флоп 5 — худшие</div><div className="panel-sub">По прибыли · 30 дней</div></div></div>{flop.map((p,i)=><Row key={p.sku} p={p} i={i} isFlop={true}/>)}</div>
        </div>
      </div>
    </main></div>
  );
}

/* ═══ 9. КАТЕГОРИИ ═══ */
function CatsScreen({onNav}){
  const total=CATS.reduce((s,c)=>s+c.rev,0);
  return (
    <div className="app"><Sidebar active="cats" onNav={onNav}/>
    <main className="main">
      <Topbar title="Категории" crumb={<><b>Разбивка</b> · {CATS.length} категорий</>}/>
      <div className="content">
        <div className="kpi-row-4">
          <Kpi accent="orange" label="Категорий"    value={String(CATS.length)} sub="активных" ico={I.cats}/>
          <Kpi accent="green"  label="Топ категория"value="Дом и кухня"         sub="29% выручки" ico={I.star}/>
          <Kpi accent="blue"   label="Общая выручка"value={fK(total)}           sub="все кат." ico={I.cash}/>
          <Kpi accent="violet" label="Ср. маржа"    value="31.2%"               sub="по категориям" ico={I.pct}/>
        </div>
        <div className="grid-2">
          <div className="panel" style={{display:'flex',flexDirection:'column',alignItems:'center',gap:18}}>
            <div className="panel-head" style={{width:'100%'}}><div><div className="panel-title">Доля выручки</div></div></div>
            <Donut data={CATS.map(c=>({v:c.rev,c:c.c}))} size={180} label={fK(total)} sub="выручка"/>
            <div style={{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center'}}>
              {CATS.map(c=><span key={c.name} style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:11.5,color:'var(--mute)'}}><span style={{width:8,height:8,borderRadius:'50%',background:c.c,flexShrink:0}}/>{c.name} {c.share}%</span>)}
            </div>
          </div>
          <div className="panel">
            <div className="panel-head"><div><div className="panel-title">По категориям</div><div className="panel-sub">Выручка и прибыль</div></div></div>
            {CATS.map(c=>(
              <div className="brkrow" key={c.name}>
                <span style={{width:10,height:10,borderRadius:3,background:c.c,flexShrink:0}}/>
                <div style={{flex:1}}><div style={{fontSize:12.5,fontWeight:600}}>{c.name}</div><div className="psub">{c.sku} SKU</div></div>
                <div style={{textAlign:'right',marginRight:12}}><div className="mono" style={{fontSize:12,fontWeight:700}}>{fK(c.rev)}</div><div style={{fontSize:11,color:'var(--green)'}}>{fK(c.profit)}</div></div>
                <div style={{width:80}}><div style={{height:6,background:'rgba(255,255,255,.05)',borderRadius:999,overflow:'hidden',marginBottom:2}}><div style={{width:`${c.share*3}%`,height:'100%',background:c.c,borderRadius:999}}/></div><div className="mono" style={{fontSize:10,color:'var(--faint)',textAlign:'right'}}>{c.share}%</div></div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </main></div>
  );
}

/* ═══ 10. ВОРОНКА ═══ */
function FunnelScreen({onNav}){
  const steps=[
    {l:'Показы',  v:'2 845 200',pct:'100%',  from:'всего',      c:'#ff6a1a'},
    {l:'Клики',   v:'318 660',  pct:'11.2%', from:'от показов', c:'#ff8a3d'},
    {l:'Корзина', v:'64 730',   pct:'20.3%', from:'от кликов',  c:'#ffb648'},
    {l:'Заказ',   v:'39 420',   pct:'60.9%', from:'от корзины', c:'#28d17c',last:true},
  ];
  return (
    <div className="app"><Sidebar active="funnel" onNav={onNav}/>
    <main className="main">
      <Topbar title="Воронка" crumb={<><b>Конверсии</b> · 30 дней</>}/>
      <div className="content">
        <div className="kpi-row-4">
          <Kpi accent="orange" label="Показы"     value="2.84M"   delta="9.1%"  dir="up"   spark={[80,85,88,92,90,95,100,98,102,108,112,118]} ico={I.cards}/>
          <Kpi accent="blue"   label="CTR"        value="11.2" unit="%" delta="1.4 пп" dir="up" spark={[8,9,9,10,10,10,11,11,11,11,11,12]} sc="#5aa9ff" ico={I.pct}/>
          <Kpi accent="violet" label="CR в заказ" value="12.3" unit="%" delta="0.6 пп" dir="up" spark={[10,11,11,11,12,12,12,12,12,12,12,13]} sc="#b07cff" ico={I.box}/>
          <Kpi accent="green"  label="Ср. чек"    value="₽ 1 086" delta="3.2%" dir="up" spark={[980,1000,1010,1020,1030,1040,1050,1055,1062,1070,1078,1086]} sc="#28d17c" ico={I.cash}/>
        </div>
        <div className="panel">
          <div className="panel-head"><div><div className="panel-title">Путь покупателя</div><div className="panel-sub">Показ → Клик → Корзина → Заказ</div></div><span className="spill"><span className="k">Сквозная</span><span className="v orange-t">1.38%</span></span></div>
          <div className="funnel-wrap">
            {steps.map((s,i)=>(
              <div key={i} className="fstep" style={{background:`linear-gradient(180deg,${s.c}1a 0%,${s.c}05 100%)`,borderColor:`${s.c}33`}}>
                <div><div className="flabel" style={{color:s.c}}>{s.l}</div><div className="fval">{s.v}</div></div>
                <div className="fconv"><span className="fpill" style={{background:`${s.c}22`,color:s.c}}>{s.pct}</span><span style={{fontSize:11,color:'var(--mute)'}}>{s.from}</span></div>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:10,marginTop:18,flexWrap:'wrap'}}>
            <span className="spill"><span className="k">Drop-off клики→корзина</span><span className="v red-t">79.7%</span></span>
            <span className="spill"><span className="k">Брошенные корзины</span><span className="v">25 310</span></span>
            <span className="spill"><span className="k">Время до покупки</span><span className="v">2.4 ч</span></span>
          </div>
        </div>
        <div className="grid-2">
          <div className="panel" style={{padding:'18px 0 4px'}}>
            <div className="panel-head" style={{padding:'0 22px'}}><div><div className="panel-title">Топ карточек по CTR</div></div></div>
            <div style={{padding:'0 12px'}}>
              <table className="tbl"><thead><tr><th>Товар</th><th>Площ.</th><th className="right">Показы</th><th className="right">CTR <span className="sort-arr">↓</span></th><th className="right">→Корзина</th><th className="right">→Заказ</th></tr></thead>
              <tbody>{CARDS.slice(0,6).map((r,i)=>(
                <tr key={i}>
                  <td><div className="pcell"><div className="pthumb">{r.e}</div><div style={{fontWeight:600}}>{r.name}</div></div></td>
                  <td><span className={`pchip ${r.p}`}><span className="sw">{r.p==='wb'?'W':'O'}</span>{r.p==='wb'?'WB':'Ozon'}</span></td>
                  <td className="right num">{fK(r.views)}</td>
                  <td className="right num" style={{color:r.ctr>=12?'var(--green)':r.ctr>=8?'var(--yellow)':'var(--red)',fontWeight:700}}>{r.ctr.toFixed(1)}%</td>
                  <td className="right num muted">{r.cart.toFixed(1)}%</td>
                  <td className="right num">{r.ord.toFixed(1)}%</td>
                </tr>
              ))}</tbody></table>
            </div>
          </div>
          <div className="panel">
            <div className="panel-head"><div><div className="panel-title">По площадкам</div><div className="panel-sub">Воронка WB vs Ozon</div></div></div>
            {[{name:'Wildberries',k:'wb',c:'#ff3d8b',imp:1840,ctr:11.6,cart:21.4,ord:13.1,total:1.42},{name:'Ozon',k:'ozon',c:'#5aa9ff',imp:1005,ctr:10.4,cart:18.7,ord:11.6,total:1.28}].map(p=>(
              <div key={p.k} style={{padding:'14px 16px',borderRadius:16,background:'rgba(255,255,255,.02)',border:'1px solid var(--bs)',marginBottom:12}}>
                <div className="row" style={{justifyContent:'space-between',marginBottom:12}}>
                  <span className={`pchip ${p.k}`}><span className="sw">{p.k==='wb'?'W':'O'}</span>{p.name}</span>
                  <span className="spill"><span className="k">Сквозная</span><span className="v orange-t">{p.total}%</span></span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
                  {[{l:'Показы',v:`${p.imp}k`},{l:'CTR',v:`${p.ctr}%`},{l:'Корзина',v:`${p.cart}%`},{l:'Заказ',v:`${p.ord}%`}].map((s,i)=>(
                    <div key={i} style={{display:'flex',flexDirection:'column',gap:4}}>
                      <div style={{fontSize:10,color:'var(--mute)',textTransform:'uppercase',letterSpacing:'.08em'}}>{s.l}</div>
                      <div className="mono" style={{fontSize:15,fontWeight:800}}>{s.v}</div>
                      <div style={{height:5,background:'rgba(255,255,255,.05)',borderRadius:999,overflow:'hidden'}}><div style={{width:`${Math.min(parseFloat(s.v)*5,100)}%`,height:'100%',background:p.c,borderRadius:999}}/></div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </main></div>
  );
}

/* ═══ APP ═══ */
function App(){
  const [sec,setSec]=useState('finance');
  const S={finance:FinanceScreen,goods:GoodsScreen,stock:StockScreen,cards:CardsScreen,vs:PlatformScreen,trends:TrendsScreen,compare:CompareScreen,top:TopFlopScreen,cats:CatsScreen,funnel:FunnelScreen};
  const Screen=S[sec]||FinanceScreen;
  return <Screen onNav={setSec}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
